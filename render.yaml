# render.yaml — Render Blueprint for WooCom WhatsApp Bot
# Docs: https://docs.render.com/blueprint-spec
#
# WhatsApp & WooCommerce creds are set as Render env vars.
# AI keys (OpenAI, Anthropic, etc.) are loaded from Supabase 'config' table.

services:
  - type: web
    name: woocom-whatsapp-bot
    runtime: docker
    plan: free  # Change to "starter" or "standard" for production
    region: singapore  # closest to BD; alternatives: oregon, ohio, frankfurt
    dockerfilePath: ./Dockerfile
    envVars:
      # --- Supabase (required to boot) ---
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false

      # --- WhatsApp Cloud API ---
      - key: WHATSAPP_PHONE_NUMBER_ID
        sync: false
      - key: WHATSAPP_ACCESS_TOKEN
        sync: false
      - key: WHATSAPP_WEBHOOK_VERIFY_TOKEN
        sync: false

      # --- WooCommerce ---
      - key: WOOCOMMERCE_URL
        sync: false
      - key: WOOCOMMERCE_KEY
        sync: false
      - key: WOOCOMMERCE_SECRET
        sync: false

      # --- App config ---
      - key: EMBEDDING_MODEL
        value: BAAI/bge-small-en-v1.5
      - key: PORT
        value: "8000"

      # AI keys (OPENAI_API_KEY, LLM_PROVIDER, etc.) are loaded
      # from the Supabase 'config' table at startup.
    healthCheckPath: /webhook
